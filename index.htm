<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINGOS EL CHANGUITO</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#111,#222,#000);
    color:white;
    text-align:center;
}

.titulo{
    font-size:50px;
    color:#FFD700;
    text-shadow:0 0 10px #FFD700,0 0 20px #FF9900;
    margin-bottom:10px;
}

.subtitulo{
    font-size:20px;
    margin-bottom:20px;
}

.opciones{
    margin-bottom:20px;
}

select{
    padding:10px;
    font-size:18px;
    border-radius:8px;
    border:none;
    font-weight:bold;
}

.contenedor{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:30px;
    flex-wrap:wrap;
}

.zona-central{
    max-width:900px;
}

.bolillero{
    width:260px;
    height:260px;
    border-radius:50%;
    margin:auto;
    border:8px solid gold;
    position:relative;
    overflow:hidden;
    box-shadow:0 0 30px gold;
}

#numeroActual{
    width:180px;
    height:180px;
    position:absolute;
    left:40px;
    top:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;
    font-weight:bold;
    color:white;
    text-shadow:3px 3px 10px black;

    background-image:url("bolilla.png");
    background-size:cover;
    background-position:center;
}

.animar{
    animation:girar 1s ease-in-out;
}

@keyframes girar{

0%{
transform:translateY(-250px) rotate(0deg) scale(.4);
}

30%{
transform:translateY(30px) rotate(180deg) scale(1.1);
}

60%{
transform:translateY(-20px) rotate(450deg);
}

100%{
transform:translateY(0px) rotate(720deg) scale(1);
}

}

button{
    margin:10px;
    padding:15px 25px;
    font-size:20px;
    font-weight:bold;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.sacar{
    background:#00c853;
    color:white;
}

.reiniciar{
    background:#d50000;
    color:white;
}

.panel{
    width:280px;
    background:#222;
    border:3px solid gold;
    border-radius:15px;
    padding:15px;
    box-shadow:0 0 20px gold;
}

.panel h2{
    margin-top:0;
    color:gold;
}

.lista-salidos{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    max-height:500px;
    overflow-y:auto;
}

.item{
    background:gold;
    color:black;
    width:40px;
    height:40px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
}

.numeros{
    margin-top:25px;
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:5px;
}

.numero{
    background:#333;
    padding:8px;
    border-radius:6px;
}

.salio{
    background:gold;
    color:black;
    font-weight:bold;
}

</style>
</head>
<body>

<h1 class="titulo">🎱 BINGOS EL CHANGUITO 🎱</h1>
<div class="subtitulo">¡La suerte está por comenzar!</div>

<div class="opciones">
<label>Modalidad:</label>

<select id="cantidad" onchange="cambiarCantidad()">
    <option value="50">Del 1 al 50</option>
    <option value="100" selected>Del 1 al 100</option>
    <option value="200">Del 1 al 200</option>
</select>

</div>

<div class="contenedor">

<div class="zona-central">

<div class="bolillero">
<div id="numeroActual">--</div>
</div>

<button class="sacar" onclick="sacarNumero()">
🎱 Sacar Número
</button>

<button class="reiniciar" onclick="reiniciar()">
🔄 Reiniciar
</button>

<h2>Números del Bingo</h2>

<div class="numeros" id="tablero"></div>

</div>

<div class="panel">

<h2>📋 Ya salieron</h2>

<div id="listaSalidos" class="lista-salidos"></div>

</div>

</div>

<script>

let maxNumero=100;
let numerosDisponibles=[];
let numerosSalidos=[];
let animando=false;

function iniciar(){

numerosDisponibles=[];
numerosSalidos=[];

for(let i=1;i<=maxNumero;i++){
numerosDisponibles.push(i);
}

crearTablero();

document.getElementById("numeroActual").innerHTML="--";

}

function crearTablero(){

const tablero=document.getElementById("tablero");
tablero.innerHTML="";

for(let i=1;i<=maxNumero;i++){

const div=document.createElement("div");

div.className="numero";
div.id="num-"+i;
div.textContent=i;

tablero.appendChild(div);

}

}

function actualizarLista(){

const lista=document.getElementById("listaSalidos");

lista.innerHTML="";

numerosSalidos.forEach(num=>{

const item=document.createElement("div");

item.className="item";
item.textContent=num;

lista.appendChild(item);

});

}

function sacarNumero(){

if(animando)return;

if(numerosDisponibles.length===0){

alert("Ya salieron todos los números");
return;

}

animando=true;

const bola=document.getElementById("numeroActual");

bola.innerHTML="?";

bola.classList.remove("animar");

void bola.offsetWidth;

bola.classList.add("animar");

setTimeout(()=>{

const indice=Math.floor(Math.random()*numerosDisponibles.length);

const numero=numerosDisponibles.splice(indice,1)[0];

numerosSalidos.push(numero);

bola.innerHTML=numero;

document.getElementById("num-"+numero).classList.add("salio");

actualizarLista();

guardar();

animando=false;

},1000);

}

function guardar(){

localStorage.setItem("salidos",JSON.stringify(numerosSalidos));
localStorage.setItem("maxNumero",maxNumero);

}

function cargar(){

const guardados=localStorage.getItem("salidos");
const maxGuardado=localStorage.getItem("maxNumero");

if(maxGuardado){

maxNumero=parseInt(maxGuardado);

document.getElementById("cantidad").value=maxNumero;

}

iniciar();

if(guardados){

numerosSalidos=JSON.parse(guardados);

numerosDisponibles=[];

for(let i=1;i<=maxNumero;i++){

if(!numerosSalidos.includes(i)){
numerosDisponibles.push(i);
}

}

numerosSalidos.forEach(num=>{

const casilla=document.getElementById("num-"+num);

if(casilla){
casilla.classList.add("salio");
}

});

actualizarLista();

if(numerosSalidos.length>0){

document.getElementById("numeroActual").innerHTML=
numerosSalidos[numerosSalidos.length-1];

}

}

}

function cambiarCantidad(){

if(confirm("¿Cambiar modalidad y reiniciar bingo?")){

maxNumero=parseInt(document.getElementById("cantidad").value);

localStorage.removeItem("salidos");

guardar();

iniciar();

}

}

function reiniciar(){

if(confirm("¿Reiniciar completamente el bingo?")){

localStorage.removeItem("salidos");

iniciar();

}

}

cargar();

</script>

</body>
</html>
