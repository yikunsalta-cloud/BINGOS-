<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINGOS EL CHANGUITO</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#111,#222,#000);
    color:white;
    text-align:center;
}

.logo-titulo{
    max-width:520px;
    width:80%;
    height:auto;
    display:block;
    margin:0 auto 10px auto;
    filter:drop-shadow(0 0 18px gold);
}

.subtitulo{
    font-size:20px;
    margin-bottom:20px;
}

.selector-izquierdo{
    position:absolute;
    left:25px;
    top:150px;
    background:#222;
    border:3px solid gold;
    border-radius:15px;
    padding:15px;
    box-shadow:0 0 15px gold;
    font-size:18px;
}

.selector-izquierdo label{
    display:block;
    color:gold;
    font-weight:bold;
    margin-bottom:8px;
}

select{
    padding:10px;
    font-size:18px;
    border-radius:8px;
    border:none;
    font-weight:bold;
}

.contenedor{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:35px;
    flex-wrap:wrap;
}

.zona-central{
    max-width:900px;
}

.bolillero{
    width:360px;
    height:360px;
    border-radius:50%;
    margin:auto;
    border:10px solid gold;
    position:relative;
    overflow:hidden;
    box-shadow:0 0 40px gold;
}

#numeroActual{
    width:250px;
    height:250px;
    position:absolute;
    left:55px;
    top:55px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:95px;
    font-weight:bold;
    color:white;
    text-shadow:4px 4px 12px black;
    background-image:url("bolilla.png");
    background-size:cover;
    background-position:center;
}

.animar{
    animation:girar 1s ease-in-out;
}

@keyframes girar{
    0%{ transform:translateY(-320px) rotate(0deg) scale(.4); }
    30%{ transform:translateY(35px) rotate(180deg) scale(1.1); }
    60%{ transform:translateY(-25px) rotate(450deg); }
    100%{ transform:translateY(0px) rotate(720deg) scale(1); }
}

button{
    margin:12px;
    padding:16px 28px;
    font-size:22px;
    font-weight:bold;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.sacar{
    background:#00c853;
    color:white;
}

.reiniciar{
    background:#d50000;
    color:white;
}

.panel{
    width:280px;
    background:#222;
    border:3px solid gold;
    border-radius:15px;
    padding:15px;
    box-shadow:0 0 20px gold;
}

.panel h2{
    margin-top:0;
    color:gold;
}

.lista-salidos{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    max-height:500px;
    overflow-y:auto;
}

.item{
    background:gold;
    color:black;
    width:40px;
    height:40px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
}

.numeros{
    margin-top:25px;
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:5px;
}

.numero{
    background:#333;
    padding:8px;
    border-radius:6px;
}

.salio{
    background:gold;
    color:black;
    font-weight:bold;
}

@media(max-width:900px){
    .selector-izquierdo{
        position:static;
        margin:0 auto 20px auto;
        width:260px;
    }

    .logo-titulo{
        max-width:95%;
    }

    .bolillero{
        width:300px;
        height:300px;
    }

    #numeroActual{
        width:210px;
        height:210px;
        left:45px;
        top:45px;
        font-size:80px;
    }
}
</style>
</head>

<body>

<img src="logo.png" class="logo-titulo" alt="Logo">

<div class="subtitulo">¡La suerte está por comenzar!</div>

<div class="selector-izquierdo">
    <label>Modalidad:</label>

    <select id="cantidad" onchange="cambiarCantidad()">
        <option value="50">Del 1 al 50</option>
        <option value="100" selected>Del 1 al 100</option>
        <option value="200">Del 1 al 200</option>
    </select>
</div>

<div class="contenedor">

    <div class="zona-central">

        <div class="bolillero">
            <div id="numeroActual">--</div>
        </div>

        <button class="sacar" onclick="sacarNumero()">🎱 Sacar Número</button>
        <button class="reiniciar" onclick="reiniciar()">🔄 Reiniciar</button>

        <h2>Números del Bingo</h2>

        <div class="numeros" id="tablero"></div>

    </div>

    <div class="panel">
        <h2>📋 Ya salieron</h2>
        <div id="listaSalidos" class="lista-salidos"></div>
    </div>

</div>

<script>
let maxNumero = 100;
let numerosDisponibles = [];
let numerosSalidos = [];
let animando = false;

function iniciar(){
    numerosDisponibles = [];
    numerosSalidos = [];

    for(let i = 1; i <= maxNumero; i++){
        numerosDisponibles.push(i);
    }

    crearTablero();
    actualizarLista();

    document.getElementById("numeroActual").innerHTML = "--";
}

function crearTablero(){
    const tablero = document.getElementById("tablero");
    tablero.innerHTML = "";

    for(let i = 1; i <= maxNumero; i++){
        const div = document.createElement("div");
        div.className = "numero";
        div.id = "num-" + i;
        div.textContent = i;
        tablero.appendChild(div);
    }
}

function actualizarLista(){
    const lista = document.getElementById("listaSalidos");
    lista.innerHTML = "";

    numerosSalidos.forEach(num => {
        const item = document.createElement("div");
        item.className = "item";
        item.textContent = num;
        lista.appendChild(item);
    });
}

function sacarNumero(){
    if(animando) return;

    if(numerosDisponibles.length === 0){
        alert("Ya salieron todos los números");
        return;
    }

    animando = true;

    const bola = document.getElementById("numeroActual");

    bola.innerHTML = "?";
    bola.classList.remove("animar");

    void bola.offsetWidth;

    bola.classList.add("animar");

    setTimeout(() => {
        const indice = Math.floor(Math.random() * numerosDisponibles.length);
        const numero = numerosDisponibles.splice(indice, 1)[0];

        numerosSalidos.push(numero);

        bola.innerHTML = numero;

        document.getElementById("num-" + numero).classList.add("salio");

        actualizarLista();
        guardar();

        animando = false;
    }, 1000);
}

function guardar(){
    localStorage.setItem("salidos", JSON.stringify(numerosSalidos));
    localStorage.setItem("maxNumero", maxNumero);
}

function cargar(){
    const guardados = localStorage.getItem("salidos");
    const maxGuardado = localStorage.getItem("maxNumero");

    if(maxGuardado){
        maxNumero = parseInt(maxGuardado);
        document.getElementById("cantidad").value = maxNumero;
    }

    iniciar();

    if(guardados){
        numerosSalidos = JSON.parse(guardados);

        numerosDisponibles = [];

        for(let i = 1; i <= maxNumero; i++){
            if(!numerosSalidos.includes(i)){
                numerosDisponibles.push(i);
            }
        }

        numerosSalidos.forEach(num => {
            const casilla = document.getElementById("num-" + num);
            if(casilla){
                casilla.classList.add("salio");
            }
        });

        actualizarLista();

        if(numerosSalidos.length > 0){
            document.getElementById("numeroActual").innerHTML =
            numerosSalidos[numerosSalidos.length - 1];
        }
    }
}

function cambiarCantidad(){
    if(confirm("¿Cambiar modalidad y reiniciar bingo?")){
        maxNumero = parseInt(document.getElementById("cantidad").value);
        localStorage.removeItem("salidos");
        guardar();
        iniciar();
    } else {
        document.getElementById("cantidad").value = maxNumero;
    }
}

function reiniciar(){
    if(confirm("¿Reiniciar completamente el bingo?")){
        localStorage.removeItem("salidos");
        iniciar();
    }
}

cargar();
</script>

</body>
